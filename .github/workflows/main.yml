name: CI-CD Pipeline

on:
push:
branches:
- main

jobs:
build-and-deploy:
runs-on: ubuntu-latest


steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Login to DockerHub
    run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

  - name: Build Docker Image
    run: docker build -t yourdockerhubusername/myapp .

  - name: Push Docker Image
    run: docker push yourdockerhubusername/myapp

  - name: Deploy to EC2
    uses: appleboy/ssh-action@master
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ubuntu
      key: ${{ secrets.EC2_SSH_KEY }}
      script: |
        docker pull yourdockerhubusername/myapp
        docker compose down
        docker compose up -d

